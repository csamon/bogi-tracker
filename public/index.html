<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Bogi Tracker — Allagrande Mapei</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css" integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA==" crossorigin="anonymous" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="map"></div>

  <div id="status">
    <div id="status-boat">— en attente de position —</div>
    <div id="status-ais">AIS : 0 cible</div>
    <div id="status-alert" class="hidden">⚠ Dernier point &gt; 45 min</div>
  </div>

  <div id="controls">
    <label>Fond :
      <select id="basemap">
        <option value="osm">OSM standard</option>
        <option value="esri">Esri Satellite</option>
        <option value="seamap">OSM + nautique</option>
      </select>
    </label>
    <label><input type="checkbox" id="toggle-wind" /> Vent (Windy)</label>
    <label><input type="checkbox" id="toggle-ais-tracks" checked /> Traces AIS</label>
    <button id="center-boat" type="button">Recentrer sur Mapei</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js" integrity="sha512-QVftwZFqvtRNi0ZyCtsznlKSWOStnDORoefr1enyq5mVL4tmKB3S/EnC3rRJcxCPavG10IcrVGSmPh6Qw5lwrg==" crossorigin="anonymous"></script>
  <script src="/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bogi Tracker — Connexion</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2438 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px 28px;
      min-width: 320px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
    .sub { color: #b0c4d8; font-size: 13px; margin-bottom: 24px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input[type=password] {
      padding: 12px 14px; font-size: 15px;
      border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05); color: #fff;
    }
    input[type=password]:focus {
      outline: none; border-color: #4a9eff;
    }
    button {
      padding: 12px 14px; font-size: 15px; font-weight: 600;
      border-radius: 8px; border: 0; cursor: pointer;
      background: #4a9eff; color: #fff;
    }
    button:hover { background: #3a8ae5; }
    .err {
      background: rgba(180, 0, 0, 0.35);
      padding: 8px 12px; border-radius: 6px;
      font-size: 13px; display: none;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bogi Tracker</h1>
    <div class="sub">Allagrande Mapei</div>
    <form method="POST" action="/login">
      <div id="err" class="err">Mot de passe incorrect</div>
      <input type="password" name="password" placeholder="Mot de passe" autofocus required autocomplete="current-password" />
      <button type="submit">Entrer</button>
    </form>
  </div>
  <script>
    if (location.search.includes('err=1')) document.getElementById('err').classList.add('show');
  </script>
</body>
</html>

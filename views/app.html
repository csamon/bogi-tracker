<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Bogi Tracker — Allagrande Mapei</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Conteneur Windy : la carte (Leaflet 1.4.0) + l'UI Windy s'y rendent -->
  <div id="windy"></div>

  <!-- Bandeau d'état Mapei (superposé) -->
  <div id="status">
    <div id="status-boat">— chargement —</div>
    <div id="status-ais">AIS : 0 cible</div>
    <div id="status-alert" class="hidden">⚠ Dernier point &gt; 45 min</div>
  </div>

  <!-- Contrôles (superposés) -->
  <div id="controls">
    <label><input type="checkbox" id="toggle-ais-tracks" checked /> Traces AIS</label>
    <label><input type="checkbox" id="toggle-points" checked /> Points YB cliquables</label>
    <button id="center-boat" type="button">Recentrer sur Mapei</button>
  </div>

  <!-- Plugin Windy : expose `windyInit` et `L` (Leaflet 1.4.0) globalement -->
  <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
  <script src="/app.js"></script>
</body>
</html>

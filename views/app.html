<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Bogi Tracker — Allagrande Mapei</title>
  <link rel="stylesheet" href="/style.css?v=3" />
</head>
<body>
  <!-- Conteneur Windy : la carte (Leaflet 1.4.0) + l'UI Windy s'y rendent -->
  <div id="windy"></div>

  <!-- Bandeau d'état Mapei (superposé) -->
  <div id="status">
    <div id="status-boat">— chargement —</div>
    <div id="status-alert" class="hidden">⚠ Dernier point &gt; 45 min</div>
  </div>

  <!-- Contrôles (superposés) -->
  <div id="controls">
    <label><input type="checkbox" id="toggle-ais" checked /> AIS (cibles + traces)</label>
    <label><input type="checkbox" id="toggle-points" checked /> Points YB cliquables</label>
    <button id="center-boat" type="button">Recentrer sur Mapei</button>
  </div>

  <!--
    ORDRE DE CHARGEMENT CRITIQUE (Windy exige cet ordre exact) :
    1. leaflet.js 1.4.0 obligatoire (ni plus, ni moins)
    2. libBoot.js — Windy charge son propre CSS, donc PAS de leaflet.css
    3. Notre app.js
  -->
  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
  <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
  <script src="/app.js?v=3"></script>
</body>
</html>
